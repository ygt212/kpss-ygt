<!doctype html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Türkiye'nin 7 coğrafi bölgesindeki 81 ili harita üzerinde tahmin ederek öğrenin. Eğlenceli ve eğitici coğrafya oyunu." />
  <title>KPSS Bilgi Oyunları</title>
  <script>
    // Prevent FOUC by reading the theme synchronously
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
